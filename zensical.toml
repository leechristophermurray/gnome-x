# GNOME X documentation site
# Built with Zensical (https://zensical.org/)
# Published at https://leechristophermurray.github.io/gnome-x/

[project]
site_name = "GNOME X"
site_description = "Unified GNOME customization hub — install extensions, themes, icons, and Experience Packs from one Libadwaita app."
site_author = "GNOME X Contributors"
site_url = "https://leechristophermurray.github.io/gnome-x/"
copyright = """
Copyright &copy; 2026 GNOME X Contributors. Released under the Apache License 2.0.
"""

repo_url = "https://github.com/leechristophermurray/gnome-x"
repo_name = "leechristophermurray/gnome-x"

# Navigation. Files are relative to docs/.
nav = [
  { "Home" = "index.md" },
  { "Install" = "install.md" },
  { "First run" = "first-run.md" },
  { "Tutorials" = [
      { "Browse and install an extension" = "tutorials/extensions.md" },
      { "Install a theme from gnome-look.org" = "tutorials/themes.md" },
      { "Snapshot your desktop into an Experience Pack" = "tutorials/build-a-pack.md" },
      { "Apply a pack from someone else" = "tutorials/apply-a-pack.md" },
      { "Override colours for individual widgets" = "tutorials/widget-colors.md" },
      { "Detect and resolve theming conflicts" = "tutorials/theming-conflicts.md" },
  ] },
  { "Concepts" = [
      { "Experience Packs" = "concepts/experience-packs.md" },
      { "Architecture" = "concepts/architecture.md" },
      { "Why no Flatpak" = "concepts/no-flatpak.md" },
  ] },
  { "Reference" = [
      { "Pack TOML schema" = "reference/pack-toml.md" },
      { "GSettings keys" = "reference/gsettings.md" },
      { "experiencectl CLI" = "reference/cli.md" },
  ] },
  { "Known limitations" = "known-limitations.md" },
  { "Contributing" = "contributing.md" },
]

# ----------------------------------------------------------------------------
# Theme
# ----------------------------------------------------------------------------
[project.theme]

language = "en"

features = [
  "announce.dismiss",
  "content.action.edit",
  "content.action.view",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
]

# Light + dark with GNOME-style accent (uses GNOME's default "blue" #3584e4).
[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

# ----------------------------------------------------------------------------
# Footer / social
# ----------------------------------------------------------------------------
[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/leechristophermurray/gnome-x"
name = "GNOME X on GitHub"

# ----------------------------------------------------------------------------
# Markdown extensions
# ----------------------------------------------------------------------------
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
