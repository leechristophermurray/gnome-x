dest = "/usr/share/glib-2.0/schemas/io.github.gnomex.GnomeX.gschema.xml"
mode = "644"

[[package.metadata.generate-rpm.assets]]
source = "../../data/icons/scalable/apps/io.github.gnomex.GnomeX.svg"
