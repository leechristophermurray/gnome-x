# Release workflow — builds .deb and .rpm packages on tag push and
# uploads them as GitHub release artifacts.
#
# Trigger: git tag v0.2.0 && git push --tags
#
# The `.deb` is built on Ubuntu against glibc 2.35+; the `.rpm` on
# Fedora 40 against glibc 2.39. Neither is a musl build — both target
# the mainstream GTK4/Libadwaita distros where most users live.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deb:
    name: Build .deb (Ubuntu 24.04)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            libglib2.0-dev \
            libssl-dev \
            pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build release binaries
        run: cargo build --release --workspace

      - name: Build .deb
        run: cargo deb --package gnomex-ui --no-build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gnome-x-deb
          path: target/debian/*.deb

  rpm:
    name: Build .rpm (Fedora 40)
    runs-on: ubuntu-24.04
    container:
      image: fedora:40
    steps:
      - name: Install build dependencies
        run: |
          dnf install -y \
            gcc \
            pkg-config \
            gtk4-devel \
            libadwaita-devel \
            glib2-devel \
            openssl-devel \
            rustc \
            cargo \
            git

      - uses: actions/checkout@v4

      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm --locked

      - name: Build release binaries
        run: cargo build --release --workspace

      - name: Build .rpm
        # cargo-generate-rpm's --package takes a *path* to the crate,
        # not a crate name.
        run: cargo generate-rpm --package ./crates/ui

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gnome-x-rpm
          path: target/generate-rpm/*.rpm

  release:
    name: Publish GitHub Release
    needs: [deb, rpm]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/gnome-x-deb/*.deb
            dist/gnome-x-rpm/*.rpm
          generate_release_notes: true
          draft: false
