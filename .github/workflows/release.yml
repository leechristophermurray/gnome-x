# Release workflow — builds .deb and .rpm packages on tag push and
# uploads them as GitHub release artifacts.
#
# Trigger: git tag v0.2.0 && git push --tags
#
# Both packages build on Ubuntu: cargo-generate-rpm is a pure-Rust
# tool and doesn't require Fedora host tooling. Avoiding the Docker
# container cuts total workflow time from ~10 min to ~3 min.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build .deb + .rpm
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install GTK build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            libglib2.0-dev \
            libssl-dev \
            pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-deb + cargo-generate-rpm
        run: |
          cargo install cargo-deb --locked
          cargo install cargo-generate-rpm --locked

      - name: Build release binaries
        run: cargo build --release --workspace

      - name: Build .deb
        run: cargo deb --package gnomex-ui --no-build

      - name: Build .rpm
        # cargo-generate-rpm's --package takes a *path* to the crate,
        # not a crate name.
        run: cargo generate-rpm --package ./crates/ui

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: gnome-x-deb
          path: target/debian/*.deb

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: gnome-x-rpm
          path: target/generate-rpm/*.rpm

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/gnome-x-deb/*.deb
            dist/gnome-x-rpm/*.rpm
          generate_release_notes: true
          draft: false
